# FinCore Frontend — nginx configuration
# Key requirements for OpenShift:
#   - Listen on 8080 (non-root cannot bind to 80)
#   - try_files for React Router (all unknown paths → index.html)
#   - Proxy /api to the backend service
#   - Gzip compression for assets
#   - Security headers

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Static assets — cache aggressively ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → backend service ──────────────────────────────────────────
    # FINCORE_BACKEND_URL is substituted by the OpenShift deployment env var.
    # Falls back to fincore-backend service name within the namespace.
    location /api/ {
    proxy_pass http://backend:5000;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 120s;
    }

    # ── React Router — all other paths serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}