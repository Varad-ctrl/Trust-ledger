name: Trust Ledger CI/CD Pipeline

on:
    push:
        branches:
            - main

    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Pipeline Started
              run: echo "Trust Ledger CI/CD Pipeline started successfully!"

            - name: Install Backend Dependencies
              working-directory: server
              run: npm ci

            - name: Install Frontend Dependencies
              working-directory: client
              run: npm ci

            - name: Build Client
              working-directory: client
              run: npm run build

            - name: Verify Server
              working-directory: server
              run: node --check src/server.js

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build Server Docker Image
              run: |
                  docker build \
                  -t ${{ secrets.DOCKERHUB_USERNAME }}/fincore-backend:latest \
                  ./server

            - name: Build Client Docker Image
              run: |
                  docker build \
                  -t ${{ secrets.DOCKERHUB_USERNAME }}/fincore-frontend:latest \
                  ./client

            - name: Push Server Docker Image
              run: |
                  docker push ${{ secrets.DOCKERHUB_USERNAME }}/fincore-backend:latest

            - name: Push Client Docker Image
              run: |
                  docker push ${{ secrets.DOCKERHUB_USERNAME }}/fincore-frontend:latest
